kind = "web"
previewPath = "/"
title = "EXZIBO Landing Page"
version = "1.0.0"
id = "artifacts/exzibo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18381

[services.development]
run = "pnpm --filter @workspace/exzibo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exzibo", "run", "build" ]
publicDir = "artifacts/exzibo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18381"
BASE_PATH = "/"
